<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Quant Bot</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff;
    --yellow: #d29922; --purple: #bc8cff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge-paper { background: #1f4a7a; color: var(--blue); }
  .badge-live  { background: #2d1f2d; color: var(--purple); }
  #connection  { margin-left: auto; font-size: 11px; }
  .connected   { color: var(--green); }
  .disconnected { color: var(--red); }

  main { display: grid; grid-template-columns: 280px 1fr; grid-template-rows: auto 1fr; gap: 16px; padding: 16px; max-width: 1600px; margin: 0 auto; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  .card h2 { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  #stats-panel { grid-row: span 2; display: flex; flex-direction: column; gap: 12px; }

  .stat { display: flex; flex-direction: column; gap: 4px; }
  .stat-label { font-size: 11px; color: var(--text2); }
  .stat-value { font-size: 22px; font-weight: 700; }
  .stat-sub   { font-size: 11px; color: var(--text2); }
  .positive   { color: var(--green); }
  .negative   { color: var(--red); }
  .neutral    { color: var(--text2); }

  .agent-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .agent-row:last-child { border-bottom: none; }
  .agent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-running { background: var(--green); }
  .dot-idle    { background: var(--yellow); }
  .dot-error   { background: var(--red); }
  .dot-stopped { background: var(--text2); }
  .agent-name  { flex: 1; font-size: 12px; }
  .agent-metric { font-size: 11px; color: var(--text2); }

  #chart-area { display: flex; flex-direction: column; gap: 16px; }
  .chart-container { position: relative; height: 260px; }

  table { width: 100%; border-collapse: collapse; }
  th { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); font-weight: 400; }
  td { padding: 8px; border-bottom: 1px solid var(--border); font-size: 12px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }
  .side-buy  { color: var(--green); font-weight: 600; }
  .side-sell { color: var(--red); font-weight: 600; }
  .status-open   { color: var(--blue); }
  .status-closed { color: var(--text2); }

  #event-log { font-size: 11px; max-height: 200px; overflow-y: auto; background: var(--bg); border-radius: 4px; padding: 8px; }
  .event-line { padding: 2px 0; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .event-line .ts { color: var(--text2); opacity: 0.6; }
  .event-signal    { color: var(--blue); }
  .event-position  { color: var(--green); }
  .event-pnl       { color: var(--yellow); }
  .event-halt      { color: var(--red); }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .metric-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
  .metric-row:last-child { border-bottom: none; }
  .metric-key { color: var(--text2); }

  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; }
    #stats-panel { grid-row: span 1; }
  }
</style>
</head>
<body>
<header>
  <h1>⚡ Polymarket Quant Bot</h1>
  <span class="badge badge-paper" id="mode-badge">PAPER TRADING</span>
  <span id="connection" class="disconnected">● disconnected</span>
</header>

<main>
  <!-- Left panel: stats + agents -->
  <aside id="stats-panel">
    <div class="card">
      <h2>Portfolio</h2>
      <div class="stat">
        <span class="stat-label">Total Value</span>
        <span class="stat-value" id="total-value">—</span>
      </div>
      <br>
      <div class="grid-2">
        <div class="stat">
          <span class="stat-label">P&amp;L</span>
          <span class="stat-value" id="total-pnl" style="font-size:18px">—</span>
          <span class="stat-sub" id="total-pnl-pct">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Cash</span>
          <span class="stat-value" id="cash" style="font-size:18px">—</span>
        </div>
      </div>
      <br>
      <div class="metric-row"><span class="metric-key">Drawdown</span><span id="drawdown">—</span></div>
      <div class="metric-row"><span class="metric-key">Peak Value</span><span id="peak-value">—</span></div>
      <div class="metric-row"><span class="metric-key">Win Rate</span><span id="win-rate">—</span></div>
      <div class="metric-row"><span class="metric-key">Open Positions</span><span id="open-positions">—</span></div>
    </div>

    <div class="card">
      <h2>Agents</h2>
      <div id="agents-list"></div>
    </div>

    <div class="card">
      <h2>Live Events</h2>
      <div id="event-log"></div>
    </div>
  </aside>

  <!-- Right panel: chart + tables -->
  <div id="chart-area">
    <div class="card">
      <h2>P&amp;L Curve</h2>
      <div class="chart-container">
        <canvas id="pnl-chart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Open Positions</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Market</th><th>Asset</th><th>Side</th>
            <th>Size $</th><th>Entry</th><th>Current</th><th>Unreal. P&amp;L</th><th>Status</th>
          </tr></thead>
          <tbody id="positions-table"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Recent Trades</h2>
      <div style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Time</th><th>Market</th><th>Side</th>
            <th>Size $</th><th>Price</th><th>Fee</th><th>P&amp;L</th><th>Mode</th>
          </tr></thead>
          <tbody id="trades-table"></tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const fmt  = (n, d=2) => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
const fmtP = n => n == null ? '—' : (n >= 0 ? '+' : '') + (n*100).toFixed(2) + '%';
const fmtT = ts => new Date(ts).toLocaleTimeString('en-US', {hour12:false});
const cls  = n => n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral';

// Chart setup
const ctx = $('pnl-chart').getContext('2d');
const pnlChart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      { label: 'Portfolio Value', data: [], borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.08)',
        borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3, yAxisID: 'y' },
      { label: 'Drawdown %',     data: [], borderColor: '#f85149', backgroundColor: 'rgba(248,81,73,0.05)',
        borderWidth: 1, pointRadius: 0, fill: true, tension: 0.3, yAxisID: 'y2' },
    ]
  },
  options: {
    responsive: true, maintainAspectRatio: false,
    animation: false,
    interaction: { mode: 'index', intersect: false },
    plugins: { legend: { labels: { color: '#8b949e', boxWidth: 12, font: { size: 11 } } } },
    scales: {
      x:  { ticks: { color:'#8b949e', maxTicksLimit:8, font:{size:10} }, grid: { color:'#21262d' } },
      y:  { position:'left',  ticks:{ color:'#58a6ff', callback: v => '$'+v.toLocaleString(), font:{size:10} }, grid:{color:'#21262d'} },
      y2: { position:'right', ticks:{ color:'#f85149', callback: v => -(v*100).toFixed(1)+'%', font:{size:10} }, grid:{display:false} },
    }
  }
});

function updateChart(history) {
  if (!history || history.length < 2) return;
  const labels = history.map(s => fmtT(s.timestamp));
  pnlChart.data.labels = labels;
  pnlChart.data.datasets[0].data = history.map(s => s.portfolioValue);
  pnlChart.data.datasets[1].data = history.map(s => -s.drawdown);
  pnlChart.update('none');
}

function updatePortfolio(p) {
  if (!p) return;
  $('total-value').textContent = fmt(p.totalValue);
  $('total-value').className   = 'stat-value ' + cls(p.totalPnl);
  $('total-pnl').textContent   = fmt(p.totalPnl);
  $('total-pnl').className     = 'stat-value ' + cls(p.totalPnl);
  $('total-pnl-pct').textContent = fmtP(p.totalPnlPct);
  $('cash').textContent        = fmt(p.cash);
  $('drawdown').textContent    = (p.currentDrawdown * 100).toFixed(2) + '%';
  $('drawdown').className      = p.currentDrawdown > 0.10 ? 'negative' : 'neutral';
  $('peak-value').textContent  = fmt(p.peakValue);
  const closed = p.winCount + p.lossCount;
  $('win-rate').textContent    = closed > 0 ? ((p.winCount/closed)*100).toFixed(1)+'%' : '—';
  const open = (p.positions ?? []).filter(po => po.status === 'open').length;
  $('open-positions').textContent = open;

  renderPositions(p.positions ?? []);
  renderTrades(p.trades ?? []);
  updateChart(p.pnlHistory ?? []);
}

function renderPositions(positions) {
  const tbody = $('positions-table');
  const open  = positions.filter(p => p.status === 'open');
  if (open.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text2);text-align:center;padding:20px">No open positions</td></tr>'; return; }
  tbody.innerHTML = open.map(p => `
    <tr>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.question}">${p.question}</td>
      <td>${p.asset ?? '—'}</td>
      <td class="side-${p.side?.toLowerCase()}">${p.side}</td>
      <td>${fmt(p.sizeUsd)}</td>
      <td>${p.entryPrice?.toFixed(4)}</td>
      <td>${p.currentPrice?.toFixed(4)}</td>
      <td class="${cls(p.unrealizedPnl)}">${fmt(p.unrealizedPnl)}</td>
      <td class="status-${p.status}">${p.status}</td>
    </tr>`).join('');
}

function renderTrades(trades) {
  const tbody = $('trades-table');
  const recent = [...trades].reverse().slice(0, 20);
  if (recent.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="color:var(--text2);text-align:center;padding:20px">No trades yet</td></tr>'; return; }
  tbody.innerHTML = recent.map(t => `
    <tr>
      <td>${fmtT(t.timestamp)}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.question}">${t.question}</td>
      <td class="side-${t.side?.toLowerCase()}">${t.side}</td>
      <td>${fmt(t.sizeUsd)}</td>
      <td>${t.price?.toFixed(4) ?? '—'}</td>
      <td>${fmt(t.fee)}</td>
      <td class="${cls(t.pnl ?? 0)}">${t.pnl != null ? fmt(t.pnl) : '—'}</td>
      <td><span class="badge badge-paper">${t.mode?.toUpperCase()}</span></td>
    </tr>`).join('');
}

function updateAgents(agents) {
  if (!agents) return;
  $('agents-list').innerHTML = agents.map(a => `
    <div class="agent-row">
      <div class="agent-dot dot-${a.status}"></div>
      <span class="agent-name">${a.name}</span>
      <span class="agent-metric">${a.status}</span>
    </div>`).join('');
}

const MAX_EVENTS = 60;
const eventLines = [];
function addEvent(e) {
  let color = 'event-line';
  let icon  = '·';
  let text  = e.type;

  if (e.type === 'signal_generated') {
    const d = e.data;
    color = 'event-line event-signal';
    icon  = '⚡';
    text  = `${d.direction} ${d.asset} $${d.strikePrice} edge=${(d.edge*100).toFixed(1)}%`;
  } else if (e.type === 'position_opened') {
    color = 'event-line event-position';
    icon  = '▲';
    text  = `opened ${e.data?.position?.question?.slice(0,40)}`;
  } else if (e.type === 'position_closed') {
    color = 'event-line event-position';
    icon  = '▼';
    text  = `closed PnL=${fmt(e.data?.pnl)}`;
  } else if (e.type === 'risk_halt') {
    color = 'event-line event-halt';
    icon  = '🛑';
    text  = `RISK HALT — ${e.data?.reason} ${(e.data?.drawdown*100).toFixed(1)}%`;
  } else if (e.type === 'pnl_update') {
    return;  // too noisy
  }

  eventLines.unshift(`<div class="${color}"><span class="ts">${fmtT(e.timestamp)}</span> ${icon} ${text}</div>`);
  if (eventLines.length > MAX_EVENTS) eventLines.pop();
  $('event-log').innerHTML = eventLines.join('');
}

// WebSocket connection
let ws = null;
function connect() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen  = () => { $('connection').textContent = '● connected'; $('connection').className = 'connected'; };
  ws.onclose = () => {
    $('connection').textContent = '● disconnected';
    $('connection').className = 'disconnected';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'state') {
        updatePortfolio(msg.data.portfolio);
        updateAgents(msg.data.agents);
        if (msg.data.events) msg.data.events.forEach(addEvent);
      } else if (msg.type === 'event') {
        addEvent(msg.data);
        // Partial portfolio refresh on pnl_update
        if (msg.data.type === 'pnl_update') {
          // Will be refreshed on next full state push
        }
      }
    } catch {}
  };
}

// Bootstrap from REST then connect WS
fetch('/api/state').then(r => r.json()).then(s => {
  updatePortfolio(s.portfolio);
  updateAgents(s.agents);
  (s.events ?? []).forEach(addEvent);
  connect();
}).catch(() => connect());
</script>
</body>
</html>
